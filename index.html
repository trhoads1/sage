<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SAGE</title>
<!-- PWA: fullscreen on iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAGE">
<!-- PWA: fullscreen on Android -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1114">
<!-- Manifest & Icons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0f1114;
    overflow: hidden;
  }
  iframe {
    width: 100%; height: 100%;
    border: none;
    background: #0f1114;
  }
  /* Safe area for notch/dynamic island */
  @supports (padding-top: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    }
  }
</style>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</head>
<body>
<iframe
  src="https://script.google.com/a/macros/bemobile.com/s/AKfycbwhjjv03OoCGwrnzBKY-5bxUyOMQf8y0WtOD4Fupepkw-KsheeQVsCTG2ort7C9k-X1tg/exec"
  allow="clipboard-write"
  sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-popups-to-escape-sandbox"
></iframe>
</body>
</html>
