<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SAGE</title>
<!-- PWA: fullscreen on iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAGE">
<!-- PWA: fullscreen on Android -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1114">
<!-- Manifest & Icons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0f1114;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: #e4e4e7;
  }

  /* ---- IFRAME (Android / Desktop) ---- */
  iframe {
    width: 100%; height: 100%;
    border: none;
    background: #0f1114;
  }

  /* ---- iOS LAUNCH SCREEN ---- */
  .ios-launch {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    padding: 32px 24px;
    text-align: center;
    background: #0f1114;
  }
  .ios-icon {
    width: 88px; height: 88px;
    border: 2px solid #84cc16;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 700;
    color: #84cc16;
    margin-bottom: 20px;
    box-shadow: 0 0 40px #84cc1615;
  }
  .ios-title {
    font-size: 24px; font-weight: 700;
    letter-spacing: 2px;
    color: #e4e4e7;
    margin-bottom: 4px;
  }
  .ios-subtitle {
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 0.5px;
    margin-bottom: 32px;
  }
  .ios-btn {
    display: inline-block;
    padding: 14px 40px;
    background: #84cc16;
    color: #0f1114;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ios-btn:active {
    background: #65a30d;
  }
  .ios-note {
    font-size: 11px;
    color: #33373f;
    margin-top: 24px;
    max-width: 260px;
    line-height: 1.5;
  }

  /* Safe area for notch/dynamic island */
  @supports (padding-top: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .ios-launch {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    }
  }
</style>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</head>
<body>
<script>
  const GAS_URL = 'https://script.google.com/a/macros/bemobile.com/s/AKfycbwhjjv03OoCGwrnzBKY-5bxUyOMQf8y0WtOD4Fupepkw-KsheeQVsCTG2ort7C9k-X1tg/exec';

  function isIOS() {
    return /iPhone|iPod|iPad/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  if (isIOS()) {
    document.body.innerHTML = `
      <div class="ios-launch">
        <div class="ios-icon">S</div>
        <div class="ios-title">SAGE</div>
        <div class="ios-subtitle">Sales Attribution & Gross Profit Engine</div>
        <a class="ios-btn" href="${GAS_URL}">Launch SAGE</a>
        <div class="ios-note">Opens in a browser view. Tap Done to return.</div>
      </div>`;
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = GAS_URL;
    iframe.allow = 'clipboard-write';
    iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-forms allow-popups-to-escape-sandbox allow-modals';
    document.body.appendChild(iframe);
  }
</script>
</body>
</html>
